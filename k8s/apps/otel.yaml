apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel
  namespace: monitoring-apps
  labels:
    app: otel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel
  template:
    metadata:
      labels:
        app: otel
    spec:
      containers:
        - name: otel
          image: monitoring/otel:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 768Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: otel
  namespace: monitoring-apps
  labels:
    app: otel
spec:
  selector:
    app: otel
  ports:
    - name: http
      port: 8080
      targetPort: http
