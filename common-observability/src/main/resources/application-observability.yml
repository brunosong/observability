management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name:unknown}
  prometheus:
    metrics:
      export:
        enabled: true

common:
  observability:
    namespace: monitoring
    environment: ${DEPLOY_ENV:prod}
