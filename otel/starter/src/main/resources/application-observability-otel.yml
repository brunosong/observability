management:
  endpoints:
    web:
      exposure:
        include: health, info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

otel:
  springboot:
    httpclients:
      enabled: true
  resource:
    attributes:
      service.name: ${spring.application.name:unknown}
      service.namespace: ${common.observability.namespace:monitoring}
      deployment.environment: ${common.observability.environment:prod}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
      protocol: grpc
      timeout: 10000
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:otlp}
    sampler: ${OTEL_TRACES_SAMPLER:parentbased_traceidratio}
    sampler.arg: ${OTEL_TRACES_SAMPLER_ARG:0.05}
  metrics:
    exporter: ${OTEL_METRICS_EXPORTER:otlp}
    export:
      interval: 60000
  logs:
    exporter: ${OTEL_LOGS_EXPORTER:otlp}
  propagators: tracecontext,baggage,b3

common:
  observability:
    namespace: monitoring
    environment: ${DEPLOY_ENV:prod}
